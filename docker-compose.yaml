services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy-network

  caddy:
    image: caddybuilds/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS
      - "443:443/udp"
    volumes:
      - $PWD/conf:/etc/caddy
      - $PWD/site:/srv
      - $PWD/caddy_data:/data
      - $PWD/caddy_config:/config
    networks:
      - proxy-network
    environment:
      - CLOUDFLARE_API_TOKEN=cfat_AXiFeTTSxt3ltXuyFeUxI6ZXFFM0Vfqa3dByYOw7436e1749

volumes:
  portainer_data:
  caddy_data:
    external: true
  caddy_config:

networks:
  proxy-network:
    driver: bridge